<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="color.css">
    <title>Primera página de estilos</title>
  </head>

  <body>

    <h1>Primera pagina de estilos</h1> <!-- Título principal -->

    <ul> <!-- Lista de elementos del menú -->
      <li><a href="">Pagina Principal</a></li> <!-- Enlace -->
      <li><a href="">Enlace 1</a></li>
      <li><a href="">Enlace 2</a></li>
      <li><a href="">Enlace 3</a></li>
    </ul>

    <!-- Primer párrafo usando la clase 'fondover' -->
    <p class="fondover">Este es el primer párrafo</p>

    <!-- Segundo párrafo usando la clase 'verdef' y con imagen -->
    <p class="verdef">
      Este es el segundo párrafo con una imagen.
      <img class="mm2" src="11471494-removebg-preview.png" alt="icono css"> <!-- Imagen con clase 'mm2' -->
    </p>

    <!-- Encabezado de nivel 3 con un ID único -->
    <h3 id="final">final de página con encabezado 3.</h3>

  </body>
</html>
